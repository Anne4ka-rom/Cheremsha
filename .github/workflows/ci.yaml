name: CI backend and frontend

on: [push, pull_request]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./fastapi_app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint backend
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v

      - name: Create runner execution proof
        run: |
          cat << 'EOF' > runner_execution_proof.txt
          ============================================================
          EXECUTED BY GITHUB ACTIONS RUNNER
          ============================================================
          Run ID        : ${{ github.run_id }}
          Run Attempt   : ${{ github.run_attempt }}
          Job ID        : ${{ github.job }}
          Workflow      : ${{ github.workflow }}
          Repository    : ${{ github.repository }}
          Commit SHA    : ${{ github.sha }}
          Ref           : ${{ github.ref }}
          Actor         : ${{ github.actor }}
          Runner OS     : ${{ runner.os }}
          Runner Arch   : ${{ runner.arch }}
          Runner Name   : ${{ runner.name }}
          Server URL    : ${{ github.server_url }}
          Timestamp (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ============================================================
          EOF
          echo "Runner proof file created: runner_execution_proof.txt"
          cat runner_execution_proof.txt

      - name: Upload runner proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-runner-proof-${{ github.run_id }}
          path: ./fastapi_app/runner_execution_proof.txt
          retention-days: 30
          if-no-files-found: error

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./fastapi_app/templates
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./fastapi_app/templates/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint