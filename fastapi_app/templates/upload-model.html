<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Загрузка модели</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --text: #e5e5e5;
            --text-muted: #888;
            --accent: #c46673;
            --border: #2a2a2a;
            --error: #c97a5c;
            --success: #86c548;
        }
        .predictor-card {
            background-color: var(--surface);
            width: 100%;
            max-width: 580px;
            border: 1px solid var(--border);
            padding: 28px 24px 32px 24px;
        }
        .title {
            font-size: 1.6rem;
            font-weight: 500;
            margin-bottom: 24px;
            letter-spacing: -0.2px;
            color: var(--text);
        }
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .field-label {
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .custom-file-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            background-color: var(--bg);
            border: 1px solid var(--border);
            padding: 0 14px;
            height: 48px;
            transition: border-color 0.2s;
        }
        .custom-file-wrapper:focus-within {
            border-color: var(--accent);
        }
        .custom-file-wrapper.error {
            border-color: var(--error);
        }

        .real-file-input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }

        .select-file-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            pointer-events: none;
            transition: color 0.2s;
        }
        .file-name-display {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
            font-size: 0.95rem;
            margin-right: 10px;
            display: none;
        }
        .file-name-display.show {
            display: block;
        }

        .clear-file-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            line-height: 1;
            cursor: pointer;
            padding: 0 4px;
            display: none;
            z-index: 3;
            transition: color 0.2s;
        }
        .clear-file-btn:hover {
            color: var(--accent);
        }
        .clear-file-btn.show {
            display: block;
        }

        .field-error {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 4px;
            display: none;
        }
        .field-error.show {
            display: block;
        }

        .predict-btn {
            width: 100%;
            background-color: var(--accent);
            border: none;
            padding: 14px 16px;
            font-size: 1rem;
            font-weight: 500;
            font-family: inherit;
            color: white;
            cursor: pointer;
            margin-top: 12px;
            border-radius: 0px;
            letter-spacing: 0.3px;
        }
        .predict-btn:hover { background-color: #b54554; }
        .predict-btn:active { background-color: #b54554; }
        .predict-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-notification {
            margin-top: 16px;
            padding: 12px 14px;
            background-color: rgba(201, 122, 92, 0.15);
            border: 1px solid var(--error);
            color: var(--error);
            font-size: 0.9rem;
            line-height: 1.4;
            border-radius: 0px;
            display: none;
        }
        .error-notification.show { display: block; }
        .success-notification {
            margin-top: 16px;
            padding: 12px 14px;
            background-color: rgba(134, 197, 72, 0.15);
            border: 1px solid var(--success);
            color: var(--success);
            font-size: 0.9rem;
            line-height: 1.4;
            border-radius: 0px;
            display: none;
            text-align: center;
        }
        .success-notification.show { display: block; }
        .hidden { display: none; }
        @media (max-width: 500px) {
            .predictor-card { padding: 20px 16px 26px; }
            .title { font-size: 1.4rem; }
        }
        .nav {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            flex-wrap: wrap;
        }
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            padding: 6px 0;
            transition: color 0.2s;
            background: transparent;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }
        .nav-link.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            margin-bottom: -2px;
        }
        .nav-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
<div class="predictor-card">
    <h1 class="title">Загрузка модели</h1>

    <div class="nav">
        <a href="predict" class="nav-link">📝 Одиночное предсказание</a>
        <a href="predict-from-csv" class="nav-link">📁 CSV предсказание</a>
        <a href="upload-model" class="nav-link active">⚙️ Загрузка модели</a>
    </div>

    <form id="uploadForm" class="form-grid">
        <div class="field-group">
            <label class="field-label" for="modelFile">Файл модели (.pkl)</label>

            <div class="custom-file-wrapper" id="fileWrapper">
                <input type="file" id="modelFile" class="real-file-input" accept=".pkl" required>

                <span class="select-file-btn" id="selectBtn">Выбрать файл</span>

                <span class="file-name-display" id="fileNameDisplay"></span>

                <button type="button" class="clear-file-btn" id="clearBtn" title="Очистить">×</button>
            </div>

            <div class="field-error" id="modelFile_error"></div>
        </div>

        <button type="submit" class="predict-btn" id="uploadBtn">Загрузить модель</button>

        <div id="errorNotification" class="error-notification"></div>
        <div id="successNotification" class="success-notification">Модель успешно загружена</div>
    </form>
</div>

<script>
    (function() {
        const form = document.getElementById('uploadForm');
        const modelFileInput = document.getElementById('modelFile');
        const fileWrapper = document.getElementById('fileWrapper');
        const selectBtn = document.getElementById('selectBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const clearBtn = document.getElementById('clearBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const errorNotification = document.getElementById('errorNotification');
        const successNotification = document.getElementById('successNotification');
        const fileErrorEl = document.getElementById('modelFile_error');

        const API_URL = 'http://127.0.0.1:8000/upload-model';

        modelFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameDisplay.textContent = file.name;
                fileNameDisplay.classList.add('show');
                clearBtn.classList.add('show');
                selectBtn.style.display = 'none';
                fileWrapper.classList.remove('error');
                fileErrorEl.classList.remove('show');
            } else {
                resetFileUI();
            }
        });

        clearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            modelFileInput.value = '';
            resetFileUI();
        });

        function resetFileUI() {
            fileNameDisplay.classList.remove('show');
            fileNameDisplay.textContent = '';
            clearBtn.classList.remove('show');
            selectBtn.style.display = 'inline';
            fileWrapper.classList.remove('error');
            fileErrorEl.classList.remove('show');
        }

        function showNotificationError(message) {
            errorNotification.textContent = message;
            errorNotification.classList.add('show');
            successNotification.classList.remove('show');
            setTimeout(() => errorNotification.classList.remove('show'), 5000);
        }

        function showNotificationSuccess() {
            successNotification.classList.add('show');
            errorNotification.classList.remove('show');
        }

        function hideNotifications() {
            errorNotification.classList.remove('show');
            successNotification.classList.remove('show');
        }

        function validateFile() {
            const file = modelFileInput.files[0];
            if (!file) {
                fileErrorEl.textContent = 'Выберите файл';
                fileErrorEl.classList.add('show');
                fileWrapper.classList.add('error');
                return false;
            }

            if (!file.name.endsWith('.pkl')) {
                fileErrorEl.textContent = 'Загрузите файл с расширением .pkl';
                fileErrorEl.classList.add('show');
                fileWrapper.classList.add('error');
                return false;
            }

            if (file.size === 0) {
                fileErrorEl.textContent = 'Файл пуст';
                fileErrorEl.classList.add('show');
                fileWrapper.classList.add('error');
                return false;
            }

            return true;
        }

        async function handleSubmit(event) {
            event.preventDefault();
            hideNotifications();

            if (!validateFile()) {
                showNotificationError('Исправьте ошибки в форме');
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Загрузка...';

            try {
                const formData = new FormData();
                formData.append('file', modelFileInput.files[0]);

                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok && response.type === 'opaque') {
                    throw new Error('Не удалось подключиться к серверу. Проверьте, запущен ли бэкенд на порту 8000.');
                }

                if (response.status === 415) {
                    throw new Error('Неподдерживаемый формат. Загрузите файл .pkl');
                }

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || `Ошибка сервера: ${response.status}`);
                }

                showNotificationSuccess();

            } catch (error) {
                console.error('Upload error:', error);
                showNotificationError(error.message || 'Не удалось загрузить модель.');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Загрузить модель';
            }
        }

        form.addEventListener('submit', handleSubmit);
    })();
</script>
</body>
</html>
</html>
